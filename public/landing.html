<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradley Phyo</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
            cursor: default;
            image-rendering: pixelated;
        }

        /* Starfield */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            image-rendering: pixelated;
        }

        .star.small {
            width: 2px;
            height: 2px;
            box-shadow: 0 0 2px white;
        }

        .star.medium {
            width: 3px;
            height: 3px;
            box-shadow: 0 0 4px white;
        }

        .star.large {
            width: 4px;
            height: 4px;
            box-shadow: 0 0 6px white;
        }

        .star.twinkle {
            animation: pixelTwinkle 1s steps(2) infinite;
        }

        @keyframes pixelTwinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Shooting stars - pixel style with diagonal trail */
        .shooting-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            box-shadow:
                4px -4px 0 #fff,
                8px -8px 0 #eee,
                12px -12px 0 #ccc,
                16px -16px 0 #999,
                20px -20px 0 #666,
                24px -24px 0 #444,
                28px -28px 0 #222;
            animation: pixelShoot 2s steps(20) infinite;
            opacity: 0;
            image-rendering: pixelated;
        }

        @keyframes pixelShoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px); opacity: 0; }
        }

        /* Meteors - orange fireballs only */
        .meteor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff8c00;
            border-radius: 50%;
            box-shadow:
                0 0 10px #ff4500,
                0 0 20px #ff6b00,
                6px -6px 0 #ff8c00,
                12px -12px 0 #ffa500,
                18px -18px 0 #cc7000,
                24px -24px 0 #995500,
                30px -30px 0 #663300;
            animation: meteorFly 8s linear infinite;
            opacity: 0;
            image-rendering: pixelated;
        }

        @keyframes meteorFly {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(-600px) translateY(600px);
                opacity: 0;
            }
        }

        /* Small orange meteor */
        .meteor-small {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #f39c12;
            border-radius: 50%;
            box-shadow:
                0 0 5px #f39c12,
                4px -4px 0 #e67e22,
                8px -8px 0 #d35400,
                12px -12px 0 #a04000;
            animation: meteorFlySmall 7s linear infinite;
            opacity: 0;
        }

        @keyframes meteorFlySmall {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(-400px) translateY(400px);
                opacity: 0;
            }
        }

        /* Left-side meteors - orange only */
        .meteor-left {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff8c00;
            border-radius: 50%;
            box-shadow:
                0 0 10px #ff4500,
                0 0 20px #ff6b00,
                -6px -6px 0 #ff8c00,
                -12px -12px 0 #ffa500,
                -18px -18px 0 #cc7000,
                -24px -24px 0 #995500,
                -30px -30px 0 #663300;
            animation: meteorFlyLeft 8s linear infinite;
            opacity: 0;
            image-rendering: pixelated;
        }

        @keyframes meteorFlyLeft {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(600px) translateY(600px);
                opacity: 0;
            }
        }

        /* Small left-side orange meteor */
        .meteor-small-left {
            position: fixed;
            width: 5px;
            height: 5px;
            background: #f39c12;
            border-radius: 50%;
            box-shadow:
                0 0 5px #f39c12,
                -4px -4px 0 #e67e22,
                -8px -8px 0 #d35400,
                -12px -12px 0 #a04000;
            animation: meteorFlySmallLeft 7s linear infinite;
            opacity: 0;
        }

        @keyframes meteorFlySmallLeft {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(400px) translateY(400px);
                opacity: 0;
            }
        }

        /* UFO / Alien Spaceship */
        .ufo {
            position: fixed;
            width: 60px;
            height: 30px;
            animation: ufoFly 15s linear infinite;
            image-rendering: pixelated;
            z-index: 5;
        }

        .ufo-body {
            position: absolute;
            width: 60px;
            height: 20px;
            background: linear-gradient(to bottom, #95a5a6, #7f8c8d, #5d6d7e);
            border-radius: 50%;
            top: 10px;
            box-shadow:
                inset 0 -4px 0 #4a5568,
                0 4px 0 rgba(0,0,0,0.3);
        }

        .ufo-dome {
            position: absolute;
            width: 30px;
            height: 20px;
            background: linear-gradient(to bottom, #81ecec, #00cec9, #00b894);
            border-radius: 50% 50% 0 0;
            top: 0;
            left: 15px;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.3);
        }

        .ufo-lights {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 8px;
            height: 8px;
            background: #ff0;
            border-radius: 50%;
            box-shadow:
                15px 0 0 #0ff,
                30px 0 0 #f0f;
            animation: ufoLights 0.3s steps(2) infinite;
        }

        @keyframes ufoLights {
            0% { box-shadow: 15px 0 0 #0ff, 30px 0 0 #f0f; }
            50% { box-shadow: 15px 0 0 #f0f, 30px 0 0 #ff0; }
            100% { box-shadow: 15px 0 0 #ff0, 30px 0 0 #0ff; }
        }

        @keyframes ufoFly {
            0% {
                transform: translateX(-100px) translateY(0);
                top: 20%;
            }
            25% {
                transform: translateX(25vw) translateY(-30px);
                top: 15%;
            }
            50% {
                transform: translateX(50vw) translateY(20px);
                top: 25%;
            }
            75% {
                transform: translateX(75vw) translateY(-20px);
                top: 18%;
            }
            100% {
                transform: translateX(110vw) translateY(0);
                top: 22%;
            }
        }

        /* Removed alien ships - keeping space cleaner */

        /* Main Container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Title - Pixel Style */
        .title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow:
                4px 4px 0 #764ba2,
                -2px -2px 0 #667eea;
            animation: pixelGlow 2s steps(4) infinite;
        }

        @keyframes pixelGlow {
            0%, 100% { text-shadow: 4px 4px 0 #764ba2, -2px -2px 0 #667eea; }
            50% { text-shadow: 4px 4px 0 #f093fb, -2px -2px 0 #4facfe; }
        }

        .subtitle {
            font-size: 0.7rem;
            color: #b0c4de;
            margin-bottom: 3rem;
            text-align: center;
            animation: blink 1s steps(2) infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Rocket Container */
        .rocket-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s steps(3);
            padding: 20px;
        }

        .rocket-wrapper:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.8));
        }

        .rocket-svg {
            width: 120px;
            height: 180px;
            animation: pixelFloat 1s steps(4) infinite;
            image-rendering: pixelated;
        }

        @keyframes pixelFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Fire/Exhaust - Pixel Style */
        .exhaust {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 80px;
            image-rendering: pixelated;
        }

        .pixel-flame {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            animation: pixelFire 0.2s steps(2) infinite;
        }

        .pixel-flame-outer {
            width: 40px;
            height: 50px;
            background:
                linear-gradient(to bottom,
                    transparent 0%,
                    #ff4500 20%,
                    #ff6b00 40%,
                    #ffa500 60%,
                    #ffcc00 80%,
                    #fff 100%
                );
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 50% 80%, 20% 100%, 0% 50%);
        }

        @keyframes pixelFire {
            0% { transform: translateX(-50%) scaleY(1); opacity: 1; }
            50% { transform: translateX(-50%) scaleY(1.2); opacity: 0.9; }
            100% { transform: translateX(-50%) scaleY(1); opacity: 1; }
        }

        /* Launch Button - Now clickable */
        .launch-btn {
            margin-top: 3rem;
            font-size: 0.8rem;
            font-family: 'Press Start 2P', cursive;
            color: #0f0;
            text-align: center;
            background: rgba(0, 255, 0, 0.1);
            padding: 15px 30px;
            border: 3px solid #0f0;
            cursor: pointer;
            transition: all 0.1s steps(2);
            image-rendering: pixelated;
            animation: btnPulse 1s steps(2) infinite;
        }

        .launch-btn:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            transform: scale(1.05);
        }

        .launch-btn:active {
            transform: scale(0.95);
            background: #0f0;
            color: #000;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.8); }
        }

        /* Launch Animation */
        .launching .rocket-svg {
            animation: pixelLaunch 3s ease-in forwards;
        }

        .launching .exhaust {
            animation: pixelLaunchExhaust 3s ease-in forwards;
        }

        @keyframes pixelLaunch {
            0% { transform: translateY(0) scale(1); }
            5% { transform: translateY(5px) scale(1); } /* slight rumble down */
            10% { transform: translateY(-3px) scale(1.02); } /* rumble up */
            15% { transform: translateY(2px) scale(1.05); } /* rumble */
            20% { transform: translateY(0) scale(1.1); } /* ready to launch */
            30% { transform: translateY(-20px) scale(1.08); } /* slow lift */
            50% { transform: translateY(-80px) scale(1); } /* accelerating */
            100% { transform: translateY(-150vh) scale(1); } /* blast off - stays full size */
        }

        @keyframes pixelLaunchExhaust {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            5% { transform: translateX(-50%) translateY(5px) scale(1); }
            10% { transform: translateX(-50%) translateY(-3px) scale(1); }
            15% { transform: translateX(-50%) translateY(2px) scale(1); }
            20% { transform: translateX(-50%) translateY(0) scale(1.2); }
            30% { transform: translateX(-50%) translateY(-20px) scale(1.3); }
            50% { transform: translateX(-50%) translateY(-80px) scale(1.2); }
            100% { transform: translateX(-50%) translateY(-150vh) scale(1.2); }
        }

        .launching .pixel-flame-outer {
            height: 70px !important;
            animation: pixelFireIntense 0.1s steps(2) infinite !important;
        }

        @keyframes pixelFireIntense {
            0% { transform: translateX(-50%) scaleY(1); }
            100% { transform: translateX(-50%) scaleY(1.2); }
        }

        /* Screen shake effect */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-3px, -2px); }
            20% { transform: translate(3px, 2px); }
            30% { transform: translate(-2px, 3px); }
            40% { transform: translate(2px, -2px); }
            50% { transform: translate(-3px, 2px); }
            60% { transform: translate(3px, -3px); }
            70% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 3px); }
            90% { transform: translate(-3px, -2px); }
        }

        body.shaking {
            animation: screenShake 0.5s ease-in-out;
        }

        /* Smoke particles */
        .smoke-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            z-index: 5;
        }

        @keyframes smokeRise {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.8;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(150px) translateX(var(--smoke-drift, 0px)) scale(4);
                opacity: 0;
            }
        }

        /* Spark particles */
        .spark {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 6;
        }

        @keyframes sparkFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--spark-x), var(--spark-y)) scale(0);
            }
        }

        /* Launch glow effect around rocket */
        .launching .rocket-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 165, 0, 0.4) 0%, rgba(255, 69, 0, 0.2) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: launchGlow 0.3s ease-out forwards;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes launchGlow {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Fade Out */
        body.fade-out {
            animation: fadeOut 1s steps(10) forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; background: #000; }
        }

        /* Pixel Planets */
        .planet {
            position: fixed;
            image-rendering: pixelated;
            opacity: 0.9;
        }

        /* Earth-like planet - with clouds and ice caps */
        .planet1 {
            width: 85px;
            height: 85px;
            top: 5%;
            right: 8%;
            background:
                radial-gradient(circle at 30% 30%,
                    #5dade2 0%,
                    #2e86ab 30%,
                    #1a5276 60%,
                    #0a2647 100%
                );
            border-radius: 50%;
            box-shadow:
                inset -10px -10px 0 rgba(0,0,0,0.35),
                inset 10px 10px 0 rgba(255,255,255,0.15),
                0 0 0 4px #154360,
                0 0 20px rgba(93, 173, 226, 0.3),
                10px 10px 0 rgba(0,0,0,0.5);
            animation: planetBob 3s steps(6) infinite;
        }

        .planet1::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 16px;
            background: #27ae60;
            top: 28px;
            left: 22px;
            border-radius: 30%;
            box-shadow:
                28px 12px 0 10px #27ae60,
                12px 28px 0 6px #2ecc71,
                -6px 18px 0 4px #27ae60,
                35px -5px 0 5px #229954;
        }

        .planet1::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 10px;
            background: rgba(255,255,255,0.55);
            top: 12px;
            left: 30px;
            border-radius: 50%;
            box-shadow:
                -20px 20px 0 6px rgba(255,255,255,0.45),
                15px 35px 0 8px rgba(255,255,255,0.35),
                -8px 50px 0 5px rgba(255,255,255,0.3);
        }

        /* Mars-like planet - with polar cap and canyons */
        .planet2 {
            width: 125px;
            height: 125px;
            bottom: 8%;
            left: 8%;
            background:
                radial-gradient(circle at 35% 35%,
                    #e74c3c 0%,
                    #c0392b 30%,
                    #922b21 60%,
                    #641e16 100%
                );
            border-radius: 50%;
            box-shadow:
                inset -14px -14px 0 rgba(0,0,0,0.45),
                inset 12px 12px 0 rgba(255,200,150,0.2),
                0 0 0 5px #7b241c,
                0 0 15px rgba(231, 76, 60, 0.25),
                12px 12px 0 rgba(0,0,0,0.5);
            animation: planetBob 4s steps(6) infinite reverse;
        }

        .planet2::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #922b21;
            border-radius: 50%;
            top: 28px;
            left: 35px;
            box-shadow:
                35px 22px 0 10px #7b241c,
                -18px 42px 0 6px #922b21,
                22px 55px 0 12px #641e16,
                50px 5px 0 7px #7b241c,
                inset 3px 3px 0 rgba(0,0,0,0.3);
        }

        .planet2::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 15px;
            background: rgba(255,255,255,0.5);
            top: 3px;
            left: 35px;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        /* Saturn with detailed rings */
        .planet3 {
            width: 75px;
            height: 75px;
            top: 78%;
            right: 8%;
            background:
                radial-gradient(circle at 30% 30%,
                    #f5b041 0%,
                    #d68910 25%,
                    #b9770e 50%,
                    #9a7d0a 75%,
                    #7e5109 100%
                );
            border-radius: 50%;
            box-shadow:
                inset -10px -10px 0 rgba(0,0,0,0.35),
                inset 8px 8px 0 rgba(255,255,200,0.25),
                0 0 0 3px #9c640c,
                0 0 15px rgba(245, 176, 65, 0.2),
                8px 8px 0 rgba(0,0,0,0.5);
            animation: planetBob 3.5s steps(6) infinite;
        }

        .planet3::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 8px;
            background: rgba(180, 140, 80, 0.4);
            top: 25px;
            left: 10px;
            border-radius: 30%;
            box-shadow:
                30px 5px 0 5px rgba(200, 160, 100, 0.3),
                15px 20px 0 8px rgba(160, 120, 60, 0.25);
        }

        .planet3::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            width: 140px;
            height: 140px;
            border: 10px solid transparent;
            border-top: 10px solid #d4ac0d;
            border-bottom: 10px solid #d4ac0d;
            border-radius: 50%;
            box-shadow:
                0 0 0 5px transparent,
                inset 0 0 0 8px rgba(241, 196, 15, 0.3),
                0 -5px 0 0 #f1c40f,
                0 5px 0 0 #f1c40f,
                0 -12px 0 0 rgba(212, 172, 13, 0.5),
                0 12px 0 0 rgba(212, 172, 13, 0.5);
        }

        /* Purple/Ice planet - with crystalline surface */
        .planet4 {
            width: 55px;
            height: 55px;
            top: 25%;
            left: 42%;
            background:
                radial-gradient(circle at 30% 30%,
                    #d7bde2 0%,
                    #bb8fce 20%,
                    #8e44ad 45%,
                    #6c3483 70%,
                    #4a235a 100%
                );
            border-radius: 50%;
            box-shadow:
                inset -7px -7px 0 rgba(0,0,0,0.35),
                inset 5px 5px 0 rgba(255,255,255,0.3),
                0 0 0 3px #512e5f,
                0 0 12px rgba(142, 68, 173, 0.3),
                5px 5px 0 rgba(0,0,0,0.5);
            animation: planetBob 2.5s steps(6) infinite;
        }

        .planet4::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            top: 12px;
            left: 15px;
            box-shadow:
                12px 8px 0 4px rgba(255,255,255,0.3),
                5px 20px 0 3px rgba(255,255,255,0.25),
                20px 18px 0 5px rgba(200,180,220,0.4);
        }

        /* Moon - with detailed craters */
        .moon {
            position: fixed;
            width: 38px;
            height: 38px;
            background:
                radial-gradient(circle at 30% 30%,
                    #ecf0f1 0%,
                    #d5dbdb 30%,
                    #bdc3c7 50%,
                    #95a5a6 75%,
                    #7f8c8d 100%
                );
            border-radius: 50%;
            top: 15%;
            left: 58%;
            box-shadow:
                inset -5px -5px 0 rgba(0,0,0,0.25),
                inset 4px 4px 0 rgba(255,255,255,0.35),
                0 0 0 2px #707b7c,
                0 0 10px rgba(236, 240, 241, 0.2),
                4px 4px 0 rgba(0,0,0,0.4);
            animation: planetBob 2s steps(6) infinite reverse;
        }

        .moon::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #a6acaf;
            border-radius: 50%;
            top: 10px;
            left: 8px;
            box-shadow:
                12px 6px 0 4px #909497,
                6px 18px 0 3px #a6acaf,
                18px 14px 0 2px #808b96,
                -2px 22px 0 2px #909497,
                inset 1px 1px 0 rgba(0,0,0,0.2);
        }

        @keyframes planetBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Pixel asteroid - with more detail */
        .asteroid {
            position: fixed;
            width: 22px;
            height: 20px;
            background: #5d6d7e;
            top: 58%;
            left: 18%;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            box-shadow:
                inset -4px -4px 0 #2c3e50,

    <script>
        // Create many pixel stars
        const starfield = document.getElementById('starfield');
        const starCount = 500;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const sizeRand = Math.random();
            if (sizeRand < 0.6) {
                star.classList.add('small');
            } else if (sizeRand < 0.85) {
                star.classList.add('medium');
            } else {
                star.classList.add('large');
            }

            if (Math.random() > 0.5) {
                star.classList.add('twinkle');
                star.style.animationDelay = Math.random() * 2 + 's';
            }

            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';

            const colorRand = Math.random();
            if (colorRand > 0.95) {
                star.style.background = '#ff6b6b';
                star.style.boxShadow = '0 0 4px #ff6b6b';
            } else if (colorRand > 0.9) {
                star.style.background = '#74b9ff';
                star.style.boxShadow = '0 0 4px #74b9ff';
            } else if (colorRand > 0.85) {
                star.style.background = '#ffeaa7';
                star.style.boxShadow = '0 0 4px #ffeaa7';
            }

            starfield.appendChild(star);
        }

        // Create pixel shooting stars
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = Math.random() * 40 + '%';
            star.style.right = '-30px';
            star.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
            starfield.appendChild(star);

            setTimeout(() => star.remove(), 2000);
        }

        setInterval(createShootingStar, 2500);
        createShootingStar();

        // Create orange meteors (from right side)
        function createMeteor(type = 'meteor') {
            const meteor = document.createElement('div');
            meteor.className = type;
            meteor.style.top = Math.random() * 40 + '%';
            meteor.style.right = '-50px';

            // Slower durations for orange meteors
            let duration, removeTime;
            if (type === 'meteor-small') {
                duration = Math.random() * 2 + 6;
                removeTime = 9000;
            } else {
                duration = Math.random() * 2 + 7;
                removeTime = 10000;
            }

            meteor.style.animationDuration = duration + 's';
            document.body.appendChild(meteor);

            setTimeout(() => meteor.remove(), removeTime);
        }

        // Create left-side orange meteors
        function createMeteorLeft(type = 'meteor-left') {
            const meteor = document.createElement('div');
            meteor.className = type;
            meteor.style.top = Math.random() * 40 + '%';
            meteor.style.left = '-50px';

            // Slower durations for orange meteors
            let duration, removeTime;
            if (type === 'meteor-small-left') {
                duration = Math.random() * 2 + 6;
                removeTime = 9000;
            } else {
                duration = Math.random() * 2 + 7;
                removeTime = 10000;
            }

            meteor.style.animationDuration = duration + 's';
            document.body.appendChild(meteor);

            setTimeout(() => meteor.remove(), removeTime);
        }

        // Meteors from right side (orange only, rare)
        setInterval(() => createMeteor('meteor'), 12000);
        setTimeout(() => createMeteor('meteor'), 2000);

        // Meteors from left side (orange only, rare)
        setInterval(() => createMeteorLeft('meteor-left'), 15000);
        setTimeout(() => createMeteorLeft('meteor-left'), 8000);

        // Create smoke particle
        function createSmoke(x, y, size = null) {
            const smoke = document.createElement('div');
            smoke.className = 'smoke-particle';
            const smokeSize = size || (Math.random() * 40 + 25);
            smoke.style.width = smokeSize + 'px';
            smoke.style.height = smokeSize + 'px';
            smoke.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
            smoke.style.top = y + 'px';
            const gray = 140 + Math.random() * 80;
            smoke.style.background = `rgba(${gray}, ${gray}, ${gray}, 0.7)`;
            // Add random horizontal drift
            smoke.style.setProperty('--smoke-drift', (Math.random() - 0.5) * 80 + 'px');
            smoke.style.animation = `smokeRise ${2 + Math.random() * 1.5}s ease-out forwards`;
            document.body.appendChild(smoke);
            setTimeout(() => smoke.remove(), 4000);
        }

        // Create big smoke cloud
        function createSmokeCloud(x, y) {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createSmoke(x + (Math.random() - 0.5) * 100, y + Math.random() * 20, 40 + Math.random() * 30);
                }, i * 30);
            }
        }

        // Create spark particle
        function createSpark(x, y) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = x + 'px';
            spark.style.top = y + 'px';
            const colors = ['#ff4500', '#ff6b00', '#ffa500', '#ffcc00', '#fff'];
            spark.style.background = colors[Math.floor(Math.random() * colors.length)];
            spark.style.boxShadow = `0 0 6px ${spark.style.background}`;

            // Random direction for spark
            const angle = Math.random() * Math.PI * 2;
            const distance = 30 + Math.random() * 50;
            spark.style.setProperty('--spark-x', Math.cos(angle) * distance + 'px');
            spark.style.setProperty('--spark-y', Math.sin(angle) * distance + 'px');
            spark.style.animation = `sparkFly ${0.3 + Math.random() * 0.4}s ease-out forwards`;

            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 800);
        }

        // Launch function
        function launchRocket() {
            const rocketWrapper = document.getElementById('rocketWrapper');
            if (rocketWrapper.classList.contains('launching')) return;

            rocketWrapper.classList.add('launching');

            // Get initial rocket position
            const initialRect = rocketWrapper.getBoundingClientRect();
            const rocketCenterX = initialRect.left + initialRect.width / 2;
            const initialBottomY = initialRect.bottom;

            // Screen shake effect
            document.body.classList.add('shaking');
            setTimeout(() => document.body.classList.remove('shaking'), 600);

            // Initial screen flash effect
            document.body.style.background = '#fff';
            setTimeout(() => {
                document.body.style.background = '#0a0a1a';
            }, 80);

            // Initial big smoke burst at launch position
            createSmokeCloud(rocketCenterX, initialBottomY);
            createSmokeCloud(rocketCenterX - 30, initialBottomY + 10);
            createSmokeCloud(rocketCenterX + 30, initialBottomY + 10);

            // Get the rocket SVG element for tracking position
            const rocketSvg = rocketWrapper.querySelector('.rocket-svg');

            // Continuous smoke that follows the rocket
            let smokeInterval = setInterval(() => {
                // Get current rocket position
                const currentRect = rocketSvg.getBoundingClientRect();
                const currentBottomY = currentRect.bottom;

                // Only create smoke if rocket is still visible on screen
                if (currentBottomY > -50) {
                    for (let i = 0; i < 3; i++) {
                        createSmoke(rocketCenterX, currentBottomY);
                    }
                }
            }, 60);

            // Sparks that follow the rocket
            let sparkInterval = setInterval(() => {
                const currentRect = rocketSvg.getBoundingClientRect();
                const currentBottomY = currentRect.bottom;

                if (currentBottomY > -50) {
                    for (let i = 0; i < 4; i++) {
                        createSpark(
                            rocketCenterX + (Math.random() - 0.5) * 40,
                            currentBottomY + Math.random() * 20
                        );
                    }
                }
            }, 50);

            // Stop effects after rocket leaves screen
            setTimeout(() => {
                clearInterval(smokeInterval);
                clearInterval(sparkInterval);
            }, 2000);

            // Fade out and redirect
            setTimeout(() => {
                document.body.classList.add('fade-out');
            }, 2500);

            setTimeout(() => {
                window.location.href = '/universe';
            }, 3500);
        }

        // Both rocket and button trigger launch
        const rocketWrapper = document.getElementById('rocketWrapper');
        const launchBtn = document.getElementById('launchBtn');

        rocketWrapper.addEventListener('click', launchRocket);
        launchBtn.addEventListener('click', launchRocket);
    </script>
</body>
</html>
